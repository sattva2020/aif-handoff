services:
  api:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: api
    environment:
      - DATABASE_URL=/data/aif.sqlite
      - PORT=3009
      - LOG_LEVEL=info
      - AIF_ENABLE_CODEX_LOGIN_PROXY=false
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - AIF_DEFAULT_RUNTIME_ID=${AIF_DEFAULT_RUNTIME_ID:-claude}
      - AIF_DEFAULT_PROVIDER_ID=${AIF_DEFAULT_PROVIDER_ID:-anthropic}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - INTERNAL_BROADCAST_TOKEN=${INTERNAL_BROADCAST_TOKEN:-}
      - AGENT_QUERY_AUDIT_ENABLED=${AGENT_QUERY_AUDIT_ENABLED:-false}
      - AIF_USAGE_LIMITS_ENABLED=${AIF_USAGE_LIMITS_ENABLED:-false}
    volumes:
      - db-data:/data
      - projects:/home/www
      - claude-auth:/home/node/.claude
      - codex-auth:/home/node/.codex
    restart: always
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /home/node/.npm:size=50m
      - /home/node/.cache:size=50m
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3009/health'').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default

  web:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: web
    depends_on:
      api:
        condition: service_healthy
    restart: always
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/cache/angie:size=50m
      - /run:size=10m
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default
      - dokploy-network

  agent:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: agent
    environment:
      - DATABASE_URL=/data/aif.sqlite
      - API_BASE_URL=http://api:3009
      - AGENT_BYPASS_PERMISSIONS=true
      - LOG_LEVEL=info
      - AIF_ENABLE_CODEX_LOGIN_PROXY=false
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - AIF_DEFAULT_RUNTIME_ID=${AIF_DEFAULT_RUNTIME_ID:-claude}
      - AIF_DEFAULT_PROVIDER_ID=${AIF_DEFAULT_PROVIDER_ID:-anthropic}
      - INTERNAL_BROADCAST_TOKEN=${INTERNAL_BROADCAST_TOKEN:-}
      - AGENT_QUERY_AUDIT_ENABLED=${AGENT_QUERY_AUDIT_ENABLED:-false}
      - AIF_USAGE_LIMITS_ENABLED=${AIF_USAGE_LIMITS_ENABLED:-false}
    volumes:
      - db-data:/data
      - projects:/home/www
      - claude-auth:/home/node/.claude
      - codex-auth:/home/node/.codex
    depends_on:
      api:
        condition: service_healthy
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - default

  mcp:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: mcp
    environment:
      - DATABASE_URL=/data/aif.sqlite
      - MCP_TRANSPORT=http
      - MCP_PORT=3100
      - LOG_LEVEL=info
    volumes:
      - db-data:/data
      - projects:/home/www
    depends_on:
      api:
        condition: service_healthy
    restart: always
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3100/health'').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default

networks:
  default:
  dokploy-network:
    external: true

volumes:
  db-data:
  projects:
  claude-auth:
  codex-auth:
