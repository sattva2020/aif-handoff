services:
  api:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: api
    ports:
      - "${PORT:-3009}:3009"
    env_file: .env
    environment:
      - DATABASE_URL=/data/aif.sqlite
      - PORT=3009
    volumes:
      - db-data:/data
      - ${PROJECTS_DIR:-./projects}:${PROJECTS_MOUNT:-/home/www}
      - claude-auth:/home/node/.claude
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: web
    ports:
      - "${WEB_PORT:-5180}:80"
    depends_on:
      - api
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: agent
    env_file: .env
    environment:
      - DATABASE_URL=/data/aif.sqlite
      - API_BASE_URL=http://api:3009
      - AGENT_BYPASS_PERMISSIONS=true
    volumes:
      - db-data:/data
      - ${PROJECTS_DIR:-./projects}:${PROJECTS_MOUNT:-/home/www}
      - claude-auth:/home/node/.claude
    depends_on:
      - api
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: mcp
    ports:
      - "${MCP_PORT:-3100}:3100"
    env_file: .env
    environment:
      - DATABASE_URL=/data/aif.sqlite
      - MCP_TRANSPORT=http
      - MCP_PORT=3100
    volumes:
      - db-data:/data
      - ${PROJECTS_DIR:-./projects}:${PROJECTS_MOUNT:-/home/www}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
  claude-auth:
